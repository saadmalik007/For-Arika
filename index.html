<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>For Arika</title>
    <link rel="shortcut icon" href="love.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
           <section class="container">
            <div class="heading">
                <h1>Arika 💋 Saad </h1>
            </div>
           </section>
    
           <section class="container" id="arika">
            <div class="name">
                <h2>Arika💕</h2>
                <div></div>
                <p>Arika will u be Saad's Valentine💖</p>
            </div>
            <div class="button">
                <button 
                    type="button" 
                    class="btn btn-success"
                    data-bs-toggle="modal"
                    data-bs-target="#loveModal">
                    Yes 💖
                </button>
                <button 
                    type="button" 
                    class="btn btn-dark"
                    data-bs-toggle="modal"
                    data-bs-target="#sadModal">
                    No 💔
                </button>
            </div>


           </section>
           <!-- Valentine Popup Modal -->
<div class="modal fade" id="loveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      
     <div class="modal-body">
  <img 
    src="happy.gif" 
    alt="Happy Sticker"
    style="width:150px; margin-bottom:15px;"
  >

  <p class="fs-5">
    Arika just made Saad the happiest person 💕  
    This Valentine is officially special 💘
  </p>

  <button type="button" class="btn btn-success mt-3" data-bs-dismiss="modal">
    Close 💞
  </button>
</div>

    </div>
  </div>
</div>
<!-- Sad Popup Modal -->
<div class="modal fade" id="sadModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">

      <div class="modal-body">
        <!-- Sad GIF -->
        <img 
          src="Overacting.gif" 
          alt="Sad Sticker"
          style="width:160px; margin-bottom:15px;"
        >

        <p class="fs-5 mt-3">
          Oh nooo 😢<br>
          Saad is officially heartbroken 💔
        </p>

        <button type="button" class="btn btn-dark mt-3" data-bs-dismiss="modal">
          Sorry 😔
        </button>
      </div>

    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
